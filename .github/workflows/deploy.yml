# Нужны секреты репозитория: Settings → Secrets and variables → Actions
#   VPS_HOST    — IP или домен VPS (без ssh:// и без порта)
#   VPS_USER    — пользователь SSH
#   VPS_SSH_KEY — полный текст приватного ключа (BEGIN … END)
# Опционально: VPS_PORT — только если SSH не на 22
name: Deploy to VPS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ~/pdf-bleed-service
            git pull origin main
            docker compose up -d --build
            docker system prune -af --volumes